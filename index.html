<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C&C Map Database</title>
<style>
:root{--bg:#0f1115;--card:#1a1d24;--text:#e6e6e6;--accent:#4da3ff;--border:#2a2f3a}
body{margin:0;font-family:system-ui,Arial;background:var(--bg);color:var(--text)}
header{padding:16px;text-align:center;font-size:1.4rem;font-weight:600}
.container{max-width:900px;margin:auto;padding:16px}
.controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px}
button.filter{background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:10px;cursor:pointer}
button.filter.active{background:var(--accent);color:#000}
.search{flex:1;min-width:200px}
.search input{width:100%;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text)}
.map-list{display:grid;gap:12px}
.map-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}
.map-title{font-weight:600;margin-bottom:6px}
.map-file{font-size:.9rem;color:#aaa}
.download{margin-top:10px;display:inline-block;background:var(--accent);color:#000;padding:8px 12px;border-radius:8px;text-decoration:none;font-weight:600}
.empty{text-align:center;padding:30px;color:#aaa}
@media (max-width:600px){
header{font-size:1.2rem}
}
</style>
</head>
<body>
<header>C&C Map Database</header>
<div class="container">
<div class="controls">
<button class="filter active" id="ra2Btn">RA2</button>
<button class="filter" id="yrBtn">Yuri's Revenge Only</button>
<div class="search"><input id="search" placeholder="Search maps..."></div>
</div>
<div id="mapList" class="map-list"></div>
<div id="empty" class="empty" style="display:none">No results match the search.</div>
</div>

<script>
let currentDir="ra2only";
let maps=[];

const ra2Btn=document.getElementById("ra2Btn");
const yrBtn=document.getElementById("yrBtn");
const search=document.getElementById("search");
const mapList=document.getElementById("mapList");
const empty=document.getElementById("empty");

ra2Btn.onclick=()=>{
ra2Btn.classList.add("active");
yrBtn.classList.remove("active");
currentDir="ra2only";
loadMaps();
};

yrBtn.onclick=()=>{
yrBtn.classList.add("active");
ra2Btn.classList.remove("active");
currentDir="yr";
loadMaps();
};

search.oninput=render;

async function loadMaps(){
maps=[];
mapList.innerHTML="";
empty.style.display="none";

try{
const res=await fetch(`./${currentDir}/index.json`);
const files=await res.json();

for(const file of files){
const text=await fetch(`./${currentDir}/${file}`).then(r=>r.text());
const name=parseMapName(text)||file;

maps.push({name,file});
}
render();
}catch(e){
empty.style.display="block";
}
}

function parseMapName(text){
const basic=text.split("[Basic]")[1];
if(!basic) return null;
const line=basic.split("\n").find(l=>l.startsWith("Name="));
if(!line) return null;
return line.replace("Name=","").trim();
}

function render(){
const q=search.value.toLowerCase();
mapList.innerHTML="";

const filtered=maps.filter(m=>
m.name.toLowerCase().includes(q) || m.file.toLowerCase().includes(q)
);

if(!filtered.length){
empty.style.display="block";
return;
}
empty.style.display="none";

for(const m of filtered){
const card=document.createElement("div");
card.className="map-card";

card.innerHTML=`
<div class="map-title">${m.name}</div>
<div class="map-file">File name: <code>${m.file}</code></div>
<a class="download" href="./${currentDir}/${m.file}" download>Download</a>
`;

mapList.appendChild(card);
}
}

loadMaps();
</script>
</body>
</html>
