name: Generate Map Index

on:
  push:
    paths:
      - 'maps/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate index.json files
        run: |
          for dir in maps/ra2only maps/yr; do
            if [ -d "$dir" ]; then
              echo "Processing $dir"

              echo "[" > "$dir/index.json"

              first=true
              find "$dir" -maxdepth 1 -type f -name "*.map" -print0 | sort -z | while IFS= read -r -d '' file; do
                filename=$(basename "$file")

                if [ "$first" = true ]; then
                  first=false
                else
                  echo "," >> "$dir/index.json"
                fi

                printf "  \"%s\"" "$filename" >> "$dir/index.json"
              done

              echo "" >> "$dir/index.json"
              echo "]" >> "$dir/index.json"
            fi
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add maps/**/index.json
          git diff --cached --quiet || git commit -m "Auto-update index.json"
          git push
