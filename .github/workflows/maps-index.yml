- name: Generate Map Index
  run: |
    for dir in maps/ra2only maps/yr; do
      if [ -d "$dir" ]; then
        echo "Processing $dir"

        echo "[" > "$dir/index.json"

        first=true
        find "$dir" -maxdepth 1 -type f -name "*.map" -print0 | sort -z | while IFS= read -r -d '' file; do
          filename=$(basename "$file")

          if [ "$first" = true ]; then
            first=false
          else
            echo "," >> "$dir/index.json"
          fi

          printf "  \"%s\"" "$filename" >> "$dir/index.json"
        done

        echo "" >> "$dir/index.json"
        echo "]" >> "$dir/index.json"
      fi
    done
